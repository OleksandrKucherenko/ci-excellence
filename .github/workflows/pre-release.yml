name: Pre-Release Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'environments/**'
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'claude/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'environments/**'

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI Feature Flags - Set these in GitHub Variables to activate jobs
  # Leave unset to skip jobs without failure
  ENABLE_COMPILE: ${{ vars.ENABLE_COMPILE || 'false' }}
  ENABLE_LINT: ${{ vars.ENABLE_LINT || 'false' }}
  ENABLE_UNIT_TESTS: ${{ vars.ENABLE_UNIT_TESTS || 'false' }}
  ENABLE_INTEGRATION_TESTS: ${{ vars.ENABLE_INTEGRATION_TESTS || 'false' }}
  ENABLE_E2E_TESTS: ${{ vars.ENABLE_E2E_TESTS || 'false' }}
  ENABLE_BUNDLE: ${{ vars.ENABLE_BUNDLE || 'false' }}
  ENABLE_SECURITY_SCAN: ${{ vars.ENABLE_SECURITY_SCAN || 'false' }}
  ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS || 'false' }}
  # Customization Variables
  ARTIFACT_RETENTION_DAYS: ${{ vars.ARTIFACT_RETENTION_DAYS || 7 }}
  DELIVERABLE_RETENTION_DAYS: ${{ vars.DELIVERABLE_RETENTION_DAYS || 14 }}
  REPORT_RETENTION_DAYS: ${{ vars.REPORT_RETENTION_DAYS || 30 }}

jobs:
  setup:
    name: Setup and Install Dependencies
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: ./scripts/ci/setup/ci-10-install-tools.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: ./scripts/ci/setup/ci-20-install-dependencies.sh

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

  compile:
    name: Compile/Build
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ vars.ENABLE_COMPILE == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Run compile
        run: ./scripts/ci/build/ci-10-compile.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
            out/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ vars.ENABLE_LINT == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Run linter
        run: ./scripts/ci/build/ci-20-lint.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ vars.ENABLE_UNIT_TESTS == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Run unit tests
        run: ./scripts/ci/test/ci-10-unit-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage/
            test-results/
          retention-days: ${{ env.REPORT_RETENTION_DAYS }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [setup, compile]
    if: ${{ vars.ENABLE_INTEGRATION_TESTS == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Download build artifacts
        if: ${{ vars.ENABLE_COMPILE == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run integration tests
        run: ./scripts/ci/test/ci-20-integration-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            coverage/
            test-results/
          retention-days: ${{ env.REPORT_RETENTION_DAYS }}

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [setup, compile]
    if: ${{ vars.ENABLE_E2E_TESTS == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Download build artifacts
        if: ${{ vars.ENABLE_COMPILE == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run E2E tests
        run: ./scripts/ci/test/ci-30-e2e-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            coverage/
            test-results/
            screenshots/
            videos/
            results/
          retention-days: ${{ env.REPORT_RETENTION_DAYS }}

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ vars.ENABLE_SECURITY_SCAN == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for trufflehog to scan

      - name: Setup mise and install tools
        run: ./scripts/ci/setup/ci-10-install-tools.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run vulnerability scan
        run: ./scripts/ci/build/ci-30-security-scan.sh

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            gitleaks-report.json
            trufflehog-report.json
            security-results.sarif
          retention-days: ${{ env.REPORT_RETENTION_DAYS }}

  bundle:
    name: Bundle and Package
    runs-on: ubuntu-latest
    needs: [compile, lint, unit-tests]
    if: |
      always() &&
      (needs.compile.result == 'success' || needs.compile.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      vars.ENABLE_BUNDLE == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache
            .cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package*.json', '**/bun.lock') }}

      - name: Download build artifacts
        if: ${{ vars.ENABLE_COMPILE == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Create bundle/package
        run: ./scripts/ci/build/ci-40-bundle.sh

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-output
          path: |
            *.tgz
            *.tar.gz
            *.zip
            dist/
          retention-days: ${{ env.DELIVERABLE_RETENTION_DAYS }}

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [setup, compile, lint, unit-tests, integration-tests, e2e-tests, security-scan, bundle]
    if: always()
    env:
      RESULT_SETUP: ${{ needs.setup.result }}
      RESULT_COMPILE: ${{ needs.compile.result }}
      RESULT_LINT: ${{ needs.lint.result }}
      RESULT_UNIT_TESTS: ${{ needs.unit-tests.result }}
      RESULT_INTEGRATION_TESTS: ${{ needs.integration-tests.result }}
      RESULT_E2E_TESTS: ${{ needs.e2e-tests.result }}
      RESULT_SECURITY_SCAN: ${{ needs.security-scan.result }}
      RESULT_BUNDLE: ${{ needs.bundle.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        env:
          ENABLE_COMPILE: ${{ vars.ENABLE_COMPILE || 'false' }}
          ENABLE_LINT: ${{ vars.ENABLE_LINT || 'false' }}
          ENABLE_UNIT_TESTS: ${{ vars.ENABLE_UNIT_TESTS || 'false' }}
          ENABLE_INTEGRATION_TESTS: ${{ vars.ENABLE_INTEGRATION_TESTS || 'false' }}
          ENABLE_E2E_TESTS: ${{ vars.ENABLE_E2E_TESTS || 'false' }}
          ENABLE_SECURITY_SCAN: ${{ vars.ENABLE_SECURITY_SCAN || 'false' }}
          ENABLE_BUNDLE: ${{ vars.ENABLE_BUNDLE || 'false' }}
        run: ./scripts/ci/reports/ci-10-summary-pre-release.sh

      - name: Check for failures
        run: ./scripts/ci/build/ci-60-check-failures.sh

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [summary]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if notifications enabled
        id: check_notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APPRISE_URLS: ${{ secrets.APPRISE_URLS }}
          ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
        run: ./scripts/ci/notification/ci-10-check-notifications-enabled.sh

      - name: Determine pipeline status
        if: steps.check_notify.outputs.enabled == 'true'
        id: status
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          RESULT_SUMMARY: ${{ needs.summary.result }}
        run: ./scripts/ci/notification/ci-20-determine-status.sh

      - name: Send notification
        if: steps.check_notify.outputs.enabled == 'true'
        env:
          APPRISE_URLS: ${{ steps.check_notify.outputs.apprise_urls }}
          NOTIFY_TITLE: Pre-Release Pipeline
          NOTIFY_MESSAGE: ${{ steps.status.outputs.message }}
          NOTIFY_STATUS: ${{ steps.status.outputs.status }}
        run: ./scripts/ci/notification/ci-30-send-notification.sh
