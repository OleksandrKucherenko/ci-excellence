name: Ops Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - promote-release
          - deploy-staging
          - deploy-production
          - mark-stable
          - mark-deprecated
      version:
        description: 'Target Version (e.g. 1.2.3)'
        required: true
        type: string
      confirm:
        description: 'Type "yes" to confirm critical actions'
        required: false
        default: 'no'

permissions:
  contents: write

jobs:
  ops-handler:
    name: Handle Ops Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate Inputs
        run: ./scripts/ci/ops/ci-10-validate-inputs.sh "${{ github.event.inputs.action }}" "${{ github.event.inputs.version }}"

      - name: Promote Release
        if: github.event.inputs.action == 'promote-release'
        run: ./scripts/ci/ops/ci-20-promote-release.sh "${{ github.event.inputs.version }}"

      - name: Deploy Staging
        if: github.event.inputs.action == 'deploy-staging'
        run: ./scripts/ci/ops/ci-30-deploy.sh staging "${{ github.event.inputs.version }}"

      - name: Deploy Production
        if: github.event.inputs.action == 'deploy-production'
        run: ./scripts/ci/ops/ci-30-deploy.sh production "${{ github.event.inputs.version }}" "${{ github.event.inputs.confirm }}"

      - name: Mark Stable
        if: github.event.inputs.action == 'mark-stable'
        run: ./scripts/ci/ops/ci-40-mark-stability.sh stable "${{ github.event.inputs.version }}"

      - name: Mark Deprecated
        if: github.event.inputs.action == 'mark-deprecated'
        run: ./scripts/ci/ops/ci-40-mark-stability.sh deprecated "${{ github.event.inputs.version }}"
